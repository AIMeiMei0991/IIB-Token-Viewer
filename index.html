<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HyperOS×IIB Token</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'MiSans VF';src:url('../MiSans VF.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'MiSans VF','Inter',-apple-system,BlinkMacSystemFont,sans-serif;font-size:13px;background:#fff;color:#0a0a0a;display:flex;flex-direction:column}
body.dark{background:#0a0a0a;color:#fafafa}

.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:208px;min-width:208px;height:100%;display:flex;flex-direction:column;border-right:1px solid #e5e5e5;background:#fff;overflow:hidden;transition:width .2s cubic-bezier(.25,.46,.45,.94),min-width .2s cubic-bezier(.25,.46,.45,.94);position:relative}
.dark .sidebar{border-right-color:#262626;background:#0a0a0a}
.sidebar.collapsed{width:0;min-width:0;border-right:none}

.sb-header{display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:52px;min-height:52px;border-bottom:1px solid #e5e5e5;flex-shrink:0}
.dark .sb-header{border-bottom-color:#262626}
.sb-logo{display:flex;flex-direction:column;gap:1px}
.sb-logo-main{font-size:13px;font-weight:550;line-height:1.3;color:#0a0a0a}
.dark .sb-logo-main{color:#fafafa}
.sb-logo-sub{font-size:10px;color:#a3a3a3;font-weight:400}
.sb-icons{display:flex;gap:2px}
.ib{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:4px;cursor:pointer;color:#a3a3a3;border:none;background:transparent;transition:all .1s}
.ib:hover{background:#f5f5f5;color:#0a0a0a}
.dark .ib:hover{background:#1c1c1c;color:#fafafa}

.sb-collections{padding:8px;border-bottom:1px solid #e5e5e5;flex-shrink:0}
.dark .sb-collections{border-bottom-color:#262626}
.coll-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:6px;cursor:pointer;color:#525252;font-size:12px;transition:all .1s}
.dark .coll-item{color:#737373}
.coll-item:hover{background:#f5f5f5}
.dark .coll-item:hover{background:#1c1c1c}
.coll-item.active{color:#0a0a0a;font-weight:500}
.dark .coll-item.active{color:#fafafa}
.coll-count{font-size:11px;color:#a3a3a3}
.coll-divider{height:1px;background:rgba(0,0,0,0.08);margin:4px 2px}
.dark .coll-divider{background:rgba(255,255,255,0.1)}
/* Interaction table */
.ia-wrap{padding:0}
.ia-section-title{background:#f7f7f7;border-bottom:1px solid #ebebeb;border-top:1px solid #ebebeb;padding:0 14px;height:36px;display:flex;align-items:center;font-size:11px;font-weight:500;color:#a3a3a3;text-transform:uppercase;letter-spacing:.05em}
.dark .ia-section-title{background:#111;border-color:#222;color:#444}
.ia-table{width:100%;border-collapse:collapse;table-layout:auto}
.ia-table th{background:#f7f7f7;border-bottom:1px solid #e5e5e5;padding:0 14px;height:44px;text-align:center;font-size:11.5px;font-weight:500;color:#737373;letter-spacing:.02em;white-space:nowrap}
.dark .ia-table th{background:#111;border-bottom-color:#262626;color:#525252}
.ia-table th:first-child{text-align:left;width:64px}
.ia-table th .sub{font-size:10px;opacity:.6;display:block;margin-top:1px;font-weight:400;text-transform:none;letter-spacing:0}
.ia-table td{padding:0 14px;height:44px;vertical-align:middle;border-bottom:1px solid #f0f0f0;font-size:12.5px;text-align:center;color:#525252}
.dark .ia-table td{border-bottom-color:#1a1a1a;color:#737373}
.ia-table td:first-child{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;text-align:left;color:#0a0a0a;white-space:nowrap}
.dark .ia-table td:first-child{color:#e5e5e5}
.ia-table td.ia-note{font-size:11px;color:#a3a3a3;text-align:left;white-space:nowrap;padding-left:20px}
.dark .ia-table td.ia-note{color:#555}
.ia-table tr:hover td{background:#fafafa}
.dark .ia-table tr:hover td{background:#111}

.sb-search{padding:10px;border-bottom:1px solid #e5e5e5;position:relative;flex-shrink:0}
.dark .sb-search{border-bottom-color:#262626}
.sb-search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:#a3a3a3;width:12px;height:12px;pointer-events:none}
.sb-search input{width:100%;padding:7px 10px 7px 28px;font-size:12px;font-family:inherit;border:1px solid #e5e5e5;border-radius:6px;background:#fafafa;color:#0a0a0a;outline:none;transition:border-color .15s}
.dark .sb-search input{border-color:#262626;background:#141414;color:#fafafa}
.sb-search input::placeholder{color:#a3a3a3}
.sb-search input:focus{border-color:#a3a3a3}

.sb-groups{flex:1;overflow-y:auto}
.sb-groups::-webkit-scrollbar{width:3px}
.sb-groups::-webkit-scrollbar-thumb{background:#e5e5e5;border-radius:2px}
.dark .sb-groups::-webkit-scrollbar-thumb{background:#333}
.sb-groups-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 6px;font-size:10.5px;font-weight:600;color:#a3a3a3;text-transform:uppercase;letter-spacing:.05em}
.group-list{padding:0 8px 8px}
.gi{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:6px;cursor:pointer;color:#525252;font-size:12px;transition:all .1s}
.dark .gi{color:#737373}
.gi:hover{background:#f5f5f5}
.dark .gi:hover{background:#1c1c1c}
.gi.active{background:#f5f5f5;color:#0a0a0a;font-weight:500}
.dark .gi.active{background:#1c1c1c;color:#fafafa}
.gi-chevron{color:#c0c0c0;font-size:10px;width:10px;transition:transform .15s;display:inline-block;flex-shrink:0}
.gi-chevron.expanded{transform:rotate(90deg)}
.gi-name{flex:1}
.gi-count{font-size:10.5px;color:#a3a3a3}
.gi-sub{padding:0 0 6px 0;overflow:hidden}
.gi-tok{padding:5px 10px 5px 30px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'JetBrains Mono',monospace;color:#737373;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all .1s}
.gi-tok:hover{background:#f5f5f5;color:#0a0a0a}
.dark .gi-tok{color:#555}
.dark .gi-tok:hover{background:#1c1c1c;color:#fafafa}
.gi-tok.active{color:#3482ff;font-weight:500;background:#3482ff0d}
.dark .gi-tok.active{color:#4788ff;background:#4788ff14}

.sb-footer{padding:11px 14px;border-top:1px solid #e5e5e5;font-size:11.5px;color:#a3a3a3;cursor:pointer;display:flex;align-items:center;gap:5px;flex-shrink:0;transition:color .1s}
.dark .sb-footer{border-top-color:#262626}
.sb-footer:hover{color:#0a0a0a}
.dark .sb-footer:hover{color:#fafafa}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;transition:margin-right .2s cubic-bezier(.25,.46,.45,.94)}

.main-hd{display:flex;align-items:center;padding:0 16px;height:52px;min-height:52px;border-bottom:1px solid #e5e5e5;gap:8px;flex-shrink:0}
.dark .main-hd{border-bottom-color:#262626}
.main-hd-left{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.main-hd-icon{color:#737373;flex-shrink:0}
.main-hd-title{font-size:13px;font-weight:500;white-space:nowrap}
.main-hd-count{font-size:12px;color:#a3a3a3;white-space:nowrap}
.main-hd-right{display:flex;align-items:center;gap:3px;flex-shrink:0}

.mode-toggle{display:flex;background:#f0f0f0;border-radius:6px;padding:2px;gap:1px;margin-right:4px}
.dark .mode-toggle{background:#1e1e1e}
.mode-toggle-label{font-size:11px;color:#a3a3a3;padding:0 6px 0 2px;align-self:center;white-space:nowrap;letter-spacing:.01em}
.dark .mode-toggle-label{color:#555}
.mode-btn{padding:6px 11px;font-size:12px;font-weight:400;cursor:pointer;border:none;outline:none;background:transparent;color:#737373;font-family:inherit;transition:all .12s;border-radius:5px;white-space:nowrap;line-height:1}
.mode-btn.active{background:#fff;color:#0a0a0a;font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.dark .mode-btn.active{background:#333;color:#fafafa;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.dark .mode-btn{color:#555}
.hd-sep{width:1px;height:18px;background:#e5e5e5;margin:0 5px;flex-shrink:0}
.dark .hd-sep{background:#262626}

.view-btns{display:flex;background:#f0f0f0;border-radius:6px;padding:2px;gap:1px;margin:0 2px}
.dark .view-btns{background:#1e1e1e}
.vb{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:5px;cursor:pointer;border:none;background:transparent;color:#a3a3a3;transition:all .12s;font-family:inherit;line-height:0}
.vb:hover{color:#0a0a0a}
.dark .vb:hover{color:#fafafa}
.vb.active{background:#fff;color:#0a0a0a;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.dark .vb.active{background:#333;color:#fafafa;box-shadow:0 1px 3px rgba(0,0,0,.4)}

.export-btn{display:flex;align-items:center;gap:4px;padding:0 10px;height:28px;font-size:12px;font-family:inherit;border:1px solid #e5e5e5;border-radius:6px;background:transparent;color:#525252;cursor:pointer;transition:all .1s;white-space:nowrap;line-height:1}
.dark .export-btn{border-color:#333;color:#a3a3a3}
.export-btn:hover{background:#f5f5f5}
.dark .export-btn:hover{background:#1c1c1c}

.theme-btn{padding:3px 8px;font-size:12px;font-family:inherit;border:1px solid #e5e5e5;border-radius:4px;background:transparent;color:#525252;cursor:pointer;transition:all .1s;white-space:nowrap}
.dark .theme-btn{border-color:#333;color:#a3a3a3}

/* TABLE */
.table-wrap{flex:1;overflow-y:auto;overflow-x:hidden}
.table-wrap::-webkit-scrollbar{width:6px}
.table-wrap::-webkit-scrollbar-thumb{background:#e5e5e5;border-radius:3px}
.dark .table-wrap::-webkit-scrollbar-thumb{background:#333}

table{width:100%;border-collapse:collapse;table-layout:fixed}
thead{position:sticky;top:0;z-index:10}
thead th{background:#f7f7f7;border-bottom:1px solid #e5e5e5;padding:0 14px;height:36px;text-align:left;font-size:11.5px;font-weight:500;color:#737373;letter-spacing:.02em;text-transform:uppercase;white-space:nowrap}
.dark thead th{background:#111;border-bottom-color:#262626;color:#525252}
th.col-name{width:32%}
th.col-val{width:22%}
th.col-syntax{width:28%}
th.col-ref{width:18%}

td{padding:0 14px;height:44px;vertical-align:middle;border-bottom:1px solid #f0f0f0;font-size:12.5px;transition:background .07s;overflow:hidden}
.dark td{border-bottom-color:#1a1a1a}
tr:hover td{background:#fafafa}
.dark tr:hover td{background:#111}
tr{cursor:pointer}

/* section header row */
.section-row td{background:#f7f7f7;height:36px;padding:0 14px;font-size:11px;font-weight:500;color:#a3a3a3;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #ebebeb;cursor:default}
.dark .section-row td{background:#111;color:#444;border-bottom-color:#222}
.section-row:hover td{background:#f7f7f7}
.dark .section-row:hover td{background:#111}

/* token name cell */
.tok-name{font-family:'JetBrains Mono',monospace;font-size:12px;color:#0a0a0a;display:block;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.dark .tok-name{color:#e5e5e5}
.tok-desc{font-size:11px;color:#a3a3a3;margin-top:1px;line-height:1.3}
.dark .tok-desc{color:#555}
.tok-dot{width:7px;height:7px;border-radius:50%;display:inline-block;vertical-align:middle;margin-right:6px}
.tok-dot.rename{background:#eab308}
.tok-dot.new{background:#22c55e}
.tok-dot.fix{background:#ef4444}

/* value cell */
.val-cell{display:flex;align-items:center;gap:8px}
.swatch{width:20px;height:20px;border-radius:3px;flex-shrink:0;position:relative;overflow:hidden;background:repeating-conic-gradient(#ccc 0% 25%,#fff 0% 50%) 0 0/8px 8px}
.swatch::after{content:'';position:absolute;inset:0;box-shadow:inset 0 0 0 1px rgba(0,0,0,.1);border-radius:3px;pointer-events:none}
.swatch-fill{position:absolute;inset:0}
.val-hex{font-family:'JetBrains Mono',monospace;font-size:12px;color:#525252}
.dark .val-hex{color:#a3a3a3}
.val-text{font-family:'JetBrains Mono',monospace;font-size:12px;color:#525252;font-weight:500}
.dark .val-text{color:#a3a3a3}
.val-num{font-family:'JetBrains Mono',monospace;font-size:13px;color:#0a0a0a;font-weight:500;display:inline-flex;align-items:baseline;gap:2px}
.dark .val-num{color:#e5e5e5}
.val-unit{font-size:11px;color:#a3a3a3;font-weight:400}

/* syntax cell */
.syn-cell{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#737373;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.dark .syn-cell{color:#555}
.syn-key{color:#7c3aed}
.dark .syn-key{color:#a78bfa}
.syn-attr{color:#0369a1}
.dark .syn-attr{color:#38bdf8}
.syn-val{color:#15803d}
.dark .syn-val{color:#4ade80}
.syn-tag{color:#737373}
.dark .syn-tag{color:#555}

/* ref cell */
.ref-cell{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#a3a3a3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ref-arrow{color:#c0c0c0;margin-right:3px}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0a0a0a;color:#fff;padding:8px 16px;border-radius:6px;font-size:12px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:100;white-space:nowrap}
.dark .toast{background:#fafafa;color:#0a0a0a}
.toast.show{opacity:1}

/* GRID VIEW */
.grid-wrap{flex:1;overflow-y:auto;padding:16px;display:none}
.grid-wrap::-webkit-scrollbar{width:6px}
.grid-wrap::-webkit-scrollbar-thumb{background:#e5e5e5;border-radius:3px}
.dark .grid-wrap::-webkit-scrollbar-thumb{background:#333}
.grid-section{margin-bottom:24px}
.grid-section-hd{font-size:11px;font-weight:500;color:#a3a3a3;text-transform:uppercase;letter-spacing:.05em;padding:0 2px;margin-bottom:10px}
.dark .grid-section-hd{color:#444}
.grid-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:8px}
.grid-card{border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid rgba(0,0,0,.06);transition:transform .12s,box-shadow .12s}
.dark .grid-card{border-color:rgba(255,255,255,.06)}
.grid-card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.12)}
.dark .grid-card:hover{box-shadow:0 6px 16px rgba(0,0,0,.4)}
.grid-card.selected{border-color:#3482ff;box-shadow:0 0 0 2px rgba(52,130,255,.25);transform:translateY(-1px)}
.dark .grid-card.selected{border-color:#3482ff;box-shadow:0 0 0 2px rgba(52,130,255,.3)}
.grid-swatch{width:100%;height:88px;position:relative;overflow:hidden;background:repeating-conic-gradient(#ccc 0% 25%,#f5f5f5 0% 50%) 0 0/12px 12px}
.grid-swatch::after{content:'';position:absolute;inset:0;box-shadow:inset 0 0 0 1px rgba(0,0,0,.09);pointer-events:none}
.grid-swatch-fill{position:absolute;inset:0}
.grid-swatch-hex{position:absolute;bottom:7px;left:8px;right:8px;font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.grid-card-body{padding:8px 10px 9px;background:#fff}
.dark .grid-card-body{background:#1c1c1c}
.grid-card-name{font-family:'JetBrains Mono',monospace;font-size:11px;color:#0a0a0a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.dark .grid-card-name{color:#e5e5e5}
.grid-card-ref{font-size:10px;color:#a3a3a3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* non-color grid previews */
.grid-preview{width:100%;height:88px;display:flex;align-items:center;justify-content:center;background:#f5f5f5;position:relative}
.dark .grid-preview{background:#1a1a1a}
.radius-shape{background:#3482ff1a;border:2px solid #3482ff33}
/* margin: two blocks with gap */
.sp-demo{display:flex;align-items:center;justify-content:center;width:100%;height:100%}
.sp-block{width:14px;height:36px;background:#d4d4d4;border-radius:4px;flex-shrink:0}
.dark .sp-block{background:#3a3a3a}
.sp-gap{height:36px;background:#3482ff14;border-left:2px solid #3482ff55;border-right:2px solid #3482ff55;flex-shrink:0;min-width:4px}
.dark .sp-gap{background:#3482ff20;border-left-color:#3482ff66;border-right-color:#3482ff66}
/* padding: outer box + inner block */
.pd-demo{display:flex;align-items:center;justify-content:center;width:100%;height:100%}
.pd-outer{display:flex;align-items:center;justify-content:center;border:2px dashed #3482ff66;background:#3482ff0d;border-radius:8px;flex-shrink:0}
.dark .pd-outer{border-color:#3482ff88;background:#3482ff18}
.pd-inner{background:#d4d4d4;border-radius:4px;flex-shrink:0}
.dark .pd-inner{background:#3a3a3a}
/* shared value label */
.sp-val{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-family:'JetBrains Mono',monospace;font-size:11px;color:#a3a3a3}
.number-val-unit{font-size:11px;color:#a3a3a3;font-weight:400}
.weight-sample{font-size:28px;color:#0a0a0a;line-height:1;font-family:'MiSans VF','MiSans','Inter',sans-serif}
.dark .weight-sample{color:#e5e5e5}
.types-sample{color:#0a0a0a;line-height:1;font-family:'MiSans VF','MiSans','Inter',sans-serif;max-width:90%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dark .types-sample{color:#e5e5e5}

/* DETAIL PANEL */
.detail-panel{position:fixed;top:0;right:0;width:300px;height:100vh;background:#fff;border-left:1px solid #e5e5e5;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .2s cubic-bezier(.25,.46,.45,.94);z-index:50;overflow:hidden}
.dark .detail-panel{background:#0c0c0c;border-left-color:#262626}
.detail-panel.open{transform:translateX(0)}
.dp-hd{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 14px 10px;border-bottom:1px solid #f0f0f0;flex-shrink:0;min-height:88px;box-sizing:border-box}
.dark .dp-hd{border-bottom-color:#1e1e1e}
.dp-title{font-size:14px;font-weight:700;color:#0a0a0a;font-family:'JetBrains Mono',monospace;line-height:1.3;word-break:break-all}
.dark .dp-title{color:#fafafa}
.dp-path{font-size:11px;color:#c0c0c0;margin-top:3px;letter-spacing:.01em}
.dp-desc{font-size:12px;color:#3482ff;margin-top:5px;font-weight:500}
.dp-close{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:4px;border:none;background:transparent;color:#a3a3a3;cursor:pointer;font-size:18px;line-height:1;flex-shrink:0;transition:all .1s}
.dp-close:hover{background:#f5f5f5;color:#0a0a0a}
.dark .dp-close:hover{background:#1c1c1c;color:#fafafa}
.dp-body{flex:1;overflow-y:auto;padding:0 0 24px}
.dp-body::-webkit-scrollbar{width:3px}
.dp-body::-webkit-scrollbar-thumb{background:#e5e5e5;border-radius:2px}
.dark .dp-body::-webkit-scrollbar-thumb{background:#333}
.dp-section{padding:12px 14px}
.dp-section+.dp-section{border-top:1px solid #f0f0f0}
.dark .dp-section+.dp-section{border-top-color:#1e1e1e}
.dp-section-label{font-size:11px;font-weight:500;color:#a3a3a3;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}
.dp-color-block{display:flex;gap:12px;align-items:flex-start}
.dp-swatch-lg{width:56px;height:56px;border-radius:10px;flex-shrink:0;position:relative;overflow:hidden;background:repeating-conic-gradient(#ddd 0% 25%,#f5f5f5 0% 50%) 0 0/10px 10px;border:1px solid rgba(0,0,0,.08);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.dp-swatch-lg::after{content:'';position:absolute;inset:0;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08);border-radius:9px;pointer-events:none}
.dp-swatch-lg-fill{position:absolute;inset:0}
.dp-color-vals{flex:1;min-width:0;padding-top:2px}
.dp-color-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.dp-color-label{color:#a3a3a3;font-size:11px;width:32px;flex-shrink:0}
.dp-color-val{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#0a0a0a}
.dark .dp-color-val{color:#e5e5e5}
.dp-contrast-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}

.dark .dp-contrast-ratio{color:#e5e5e5}

.dp-badge-aaa{background:#dcfce7;color:#15803d}
.dark .dp-badge-aaa{background:#14532d;color:#4ade80}
.dp-badge-aa{background:#dbeafe;color:#1d4ed8}
.dark .dp-badge-aa{background:#1e3a8a;color:#60a5fa}

.dark .dp-badge-fail{background:#7f1d1d;color:#f87171}

.dp-mode-label{font-size:11.5px;color:#a3a3a3;width:40px;flex-shrink:0}

.dark .dp-mode-val{color:#a3a3a3}
.dp-mode-row.active .dp-mode-label{color:#3482ff;font-weight:600}
.dp-mode-row.active .dp-mode-val{color:#0a0a0a;font-weight:500}

.dark .dp-tab.active{background:#fafafa;color:#0a0a0a;border-color:#fafafa}

.dark .dp-code-block{background:#141414}

.dark .dp-code-text{color:#a3a3a3}
.dp-copy-btn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:5px;border:1px solid #e5e5e5;background:#fff;color:#737373;cursor:pointer;transition:all .1s;flex-shrink:0}
.dark .dp-copy-btn{border-color:#333;background:#1c1c1c;color:#737373}
.dp-copy-btn:hover{background:#f5f5f5;color:#0a0a0a;border-color:#c0c0c0}
.dark .dp-copy-btn:hover{background:#262626;color:#fafafa;border-color:#555}

tr.selected td{background:#f0f6ff!important}
.dark tr.selected td{background:#0d1f3c!important}
tr.selected td:first-child{border-left:2px solid #3482ff;padding-left:12px}

/* theme btn in toolbar */
.theme-icon-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;color:#737373;border:none;background:transparent;transition:all .1s;flex-shrink:0}

.dark .theme-icon-btn:hover{background:#1c1c1c;color:#fafafa}

.dark .empty-clear{border-color:#333;color:#a3a3a3}
.empty-clear:hover{background:#f5f5f5}
.dark .empty-clear:hover{background:#1c1c1c}

.shortcut-panel{position:absolute;bottom:44px;left:0;right:0;background:#fff;border-top:1px solid #e5e5e5;padding:10px 14px;display:none;flex-direction:column;gap:6px;box-shadow:0 -4px 16px rgba(0,0,0,.06)}

.dark .sc-key{background:#1e1e1e;color:#e5e5e5;border-color:#333}

.exp-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .15s}

.dark .exp-fmt-tabs{background:#1c1c1c}

.dark .exp-tab{color:#555}

.exp-preview{flex:1;min-height:0;margin:14px 24px;overflow-x:hidden;overflow-y:auto;background:#f7f7f7;border-radius:10px;padding:16px 18px;border:1px solid rgba(0,0,0,.05)}

.exp-footer-right{display:flex;align-items:center;gap:10px}
.exp-all-btn{display:flex;align-items:center;gap:6px;padding:8px 18px;font-size:13px;font-family:inherit;border:1px solid #c8d8f0;border-radius:8px;background:#f0f6ff;color:#3482ff;cursor:pointer;transition:all .1s;font-weight:500;white-space:nowrap}
.dark .exp-all-btn{border-color:#2a3f5f;background:#1a2a3f;color:#5a9bff}
.exp-all-btn:hover{background:#e0eeff;border-color:#3482ff}
.exp-copy2{display:flex;align-items:center;gap:6px;padding:8px 18px;font-size:13px;font-family:inherit;border:1px solid #e5e5e5;border-radius:8px;background:#fff;color:#525252;cursor:pointer;transition:all .1s;font-weight:500}

.dark .exp-copy2:hover{background:#262626}
.exp-dl{display:flex;align-items:center;gap:6px;padding:8px 20px;font-size:13px;font-family:inherit;border:none;border-radius:8px;background:#0a0a0a;color:#fff;cursor:pointer;font-weight:500;transition:all .1s}

.exp-dl:hover{background:#333}
.dark .exp-dl:hover{background:#d0d0d0}
</style>
</head>

<div class="app">

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function parseHex(h) {
  h = h.replace('#','').toUpperCase();
  if (h.length === 8) {
    const a = parseInt(h.slice(0,2),16)/255;
    const r = parseInt(h.slice(2,4),16);
    const g = parseInt(h.slice(4,6),16);
    const b = parseInt(h.slice(6,8),16);
    return {r,g,b,a};
  } else {
    return {r:parseInt(h.slice(0,2),16),g:parseInt(h.slice(2,4),16),b:parseInt(h.slice(4,6),16),a:1};
  }
}

function toRgba(h) {
  const c = parseHex(h);
  return `rgba(${c.r},${c.g},${c.b},${c.a.toFixed(3)})`;
}

function toDisplay(h) {
  const c = parseHex(h);
  const hex = '#' + [c.r,c.g,c.b].map(v=>('0'+v.toString(16)).slice(-2).toUpperCase()).join('');
  if (c.a >= 0.999) return hex;
  return hex + ' · ' + Math.round(c.a * 100) + '%';
}

function toAndroidRef(ref) {
  if (!ref) return null;
  // "blue/color-blue-light-level1" → "miuix_color_blue_light_level1"
  const parts = ref.split('/');
  const name = parts[parts.length - 1];
  return 'miuix_color_' + name.replace(/-/g,'_').replace(/\./g,'_');
}

function toAndroidName(group, name) {
  const n = name.toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/__+/g,'_');
  return 'miuix_default_color_' + n;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function syntaxColor(androidName, ref, hexVal) {
  const refStr = ref ? `@color/${toAndroidRef(ref)}` : hexVal;
  return `<span class="syn-tag">&lt;</span><span class="syn-key">color</span> <span class="syn-attr">name</span>=<span class="syn-val">"${escHtml(androidName)}"</span><span class="syn-tag">&gt;</span>${escHtml(refStr)}<span class="syn-tag">&lt;/color&gt;</span>`;
}

function syntaxDimen(name, val, unit) {
  return `<span class="syn-tag">&lt;</span><span class="syn-key">dimen</span> <span class="syn-attr">name</span>=<span class="syn-val">"${name}"</span><span class="syn-tag">&gt;</span>${val}${unit}<span class="syn-tag">&lt;/dimen&gt;</span>`;
}

function syntaxInt(name, val) {
  return `<span class="syn-tag">&lt;</span><span class="syn-key">integer</span> <span class="syn-attr">name</span>=<span class="syn-val">"${name}"</span><span class="syn-tag">&gt;</span>${val}<span class="syn-tag">&lt;/integer&gt;</span>`;
}

function syntaxStr(name, val) {
  return `<span class="syn-tag">&lt;</span><span class="syn-key">string</span> <span class="syn-attr">name</span>=<span class="syn-val">"${name}"</span><span class="syn-tag">&gt;</span>${val}<span class="syn-tag">&lt;/string&gt;</span>`;
}

// ─── CSS HELPERS ──────────────────────────────────────────────────────────────
function toCSShex(h) {
  h = h.replace('#','').toUpperCase();
  if (h.length === 8) return '#' + h.slice(2).toLowerCase() + h.slice(0,2).toLowerCase();
  return '#' + h.toLowerCase();
}

function luminance(r,g,b) {
  return [r,g,b].reduce((sum,c,i) => {
    c /= 255;
    c = c <= 0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4);
    return sum + c * [0.2126,0.7152,0.0722][i];
  }, 0);
}

function contrastWith(h, br, bg, bb) {
  const c = parseHex(h);
  const ra = c.r*c.a + br*(1-c.a), ga = c.g*c.a + bg*(1-c.a), ba = c.b*c.a + bb*(1-c.a);
  const l1 = luminance(ra,ga,ba), l2 = luminance(br,bg,bb);
  const li = Math.max(l1,l2), da = Math.min(l1,l2);
  return (li+0.05)/(da+0.05);
}

function swatchTextStyle(h) {
  const c = parseHex(h);
  // blend on white background to handle semi-transparent colors
  const r = c.r * c.a + 255 * (1 - c.a);
  const g = c.g * c.a + 255 * (1 - c.a);
  const b = c.b * c.a + 255 * (1 - c.a);
  const lum = luminance(r, g, b);
  return lum > 0.35
    ? 'color:rgba(0,0,0,0.85);text-shadow:none'
    : 'color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.45)';
}

function wcagBadge(ratio) {
  if (ratio >= 7)   return `<span class="dp-badge dp-badge-aaa">AAA</span>`;
  if (ratio >= 4.5) return `<span class="dp-badge dp-badge-aa">AA</span>`;
  if (ratio >= 3)   return `<span class="dp-badge dp-badge-aa">AA lg</span>`;
  return `<span class="dp-badge dp-badge-fail">Fail</span>`;
}

function syntaxCssColor(varName, hexVal) {
  const css = toCSShex(hexVal);
  return `<span class="syn-attr">--${escHtml(varName)}</span>: <span class="syn-val">${css}</span>;`;
}
function syntaxCssDimen(varName, val, unit) {
  return `<span class="syn-attr">--${escHtml(varName)}</span>: <span class="syn-val">${val}${unit}</span>;`;
}
function syntaxCssInt(varName, val) {
  return `<span class="syn-attr">--${escHtml(varName)}</span>: <span class="syn-val">${val}</span>;`;
}
function syntaxCssStr(varName, val) {
  return `<span class="syn-attr">--${escHtml(varName)}</span>: <span class="syn-val">${escHtml(String(val))}</span>;`;
}

function renderSidebar() {
  // Collections
  const sc = document.getElementById('sb-coll');
  sc.innerHTML = Object.keys(COLL_NAMES).map(id => `
    ${(id === 'iib' || id === 'interaction') ? '<div class="coll-divider"></div>' : ''}

      <span>${COLL_NAMES[id]}</span>
      ${COUNTS[id] ? `<span class="coll-count">${COUNTS[id]}</span>` : ''}
    </div>`).join('');

  // Groups
  const gl = document.getElementById('group-list');
  let groupsData = [];
  if (['feature','color','number','types','iib'].includes(curColl)) {
    groupsData = DATA[curColl].map(g => ({
      name: g.group,
      count: g.tokens.length,
      tokens: g.tokens.map(t => t.name)
    }));
  } else if (curColl === 'radius') {
    groupsData = [{name:'全部', count: DATA.radius.length, tokens: DATA.radius.map(t=>t.name)}];

    groupsData = [{name:'全部', count: DATA.weight.length, tokens: DATA.weight.map(t=>t.name)}];

function renderView() {
  const isInteraction = curColl === 'interaction';
  const isGrid = !isInteraction && curView === 'grid' && GRID_COLLS.has(curColl);
  document.getElementById('table-wrap').style.display = isGrid ? 'none' : '';
  document.getElementById('grid-wrap').style.display  = isGrid ? 'block' : 'none';
  document.getElementById('token-table').style.display = isInteraction ? 'none' : '';
  document.getElementById('interaction-wrap').style.display = isInteraction ? 'block' : 'none';
  document.getElementById('hd-count').style.display = isInteraction ? 'none' : '';
  if (isGrid) renderGrid();
  else if (isInteraction) renderInteraction();
  else renderTable();
}

function renderInteraction() {
  const cols = [
    ['常态','normal'], ['悬停','hover'], ['按下','touch'], ['选中','select'],
    ['常态+按下','normal+touch'], ['选中+悬停','hover+select'],
    ['悬停+按下','hover+touch'], ['选中+按下','select+touch'],
  ];
  const lightVals = ['0%','4%','10%','6%','0%+12%','6%+4%','4%+10%','6%+10%'];
  const darkVals  = ['0%','8%','14%','12%','0%+14%','12%+8%','8%+14%','12%+14%'];

  const ths = cols.map(([zh,en]) =>
    `<th>${zh}<span class="sub">${en}</span></th>`).join('');
  const lightTds = lightVals.map(v => `<td>${v}</td>`).join('');
  const darkTds  = darkVals.map(v  => `<td>${v}</td>`).join('');

  document.getElementById('interaction-wrap').innerHTML = `
    <div class="ia-section-title">系统通用交互反馈色</div>
    <table class="ia-table">
      <thead><tr><th></th>${ths}<th></th></tr></thead>
      <tbody>
        <tr><td>light</td>${lightTds}<td class="ia-note">基于黑色压暗</td></tr>
        <tr><td>dark</td>${darkTds}<td class="ia-note">基于白色提亮</td></tr>
      </tbody>
    </table>
    <div class="ia-section-title" style="margin-top:1px">禁用色</div>
    <table class="ia-table">
      <tbody>
        <tr><td style="padding-right:6px">disabled</td><td style="text-align:left;padding-left:6px;color:#525252">将组件 &amp; 颜色不透明度调至 <span style="font-family:\'JetBrains Mono\',monospace;font-size:12px;color:#0a0a0a" class="dark-val">30%</span></td></tr>
      </tbody>
    </table>`;
}

function setView(v) {
  curView = v;
  document.getElementById('vb-list').classList.toggle('active', v === 'list');
  document.getElementById('vb-grid').classList.toggle('active', v === 'grid');
  renderView();
}

// ─── RENDER GRID ──────────────────────────────────────────────────────────────
function renderGrid() {
  const wrap = document.getElementById('grid-wrap');
  const q = searchQ.toLowerCase();
  function matchQ(s) { return !q || s.toLowerCase().includes(q); }
  let html = '';

  if (curColl === 'feature') {
    const groups = DATA.feature;
    groups.forEach(g => {
      const filtered = g.tokens.filter(t => matchQ(t.name) || matchQ(g.group));
      if (!filtered.length) return;
      html += `<div class="grid-section"><div class="grid-section-hd">${g.group} <span style="font-weight:400;opacity:.5">${filtered.length}</span></div><div class="grid-cards">`;
      filtered.forEach(t => {
        const mdata = t[curMode];
        const rgba = toRgba(mdata.h);
        const display = toDisplay(mdata.h);
        const ref = mdata.r ? `→ ${mdata.r}` : '';
        html += `<div class="grid-card" data-rid="feature|${g.group}|${t.name}" onclick="openDetail('feature','${g.group}','${t.name}')">
          <div class="grid-swatch"><div class="grid-swatch-fill" style="background:${rgba}"></div><div class="grid-swatch-hex" style="${swatchTextStyle(mdata.h)}">${escHtml(display)}</div></div>
          <div class="grid-card-body"><div class="grid-card-name">${escHtml(t.name)}</div><div class="grid-card-ref">${escHtml(ref)}</div></div>
        </div>`;
      });
      html += `</div></div>`;
    });
  } else if (curColl === 'color') {
    const groups = DATA.color;
    groups.forEach(g => {
      const filtered = g.tokens.filter(t => matchQ(t.name) || matchQ(g.group));
      if (!filtered.length) return;
      html += `<div class="grid-section"><div class="grid-section-hd">${g.group} <span style="font-weight:400;opacity:.5">${filtered.length}</span></div><div class="grid-cards">`;
      filtered.forEach(t => {
        const rgba = toRgba(t.h);
        const display = toDisplay(t.h);
        html += `<div class="grid-card" data-rid="color|${g.group}|${t.name}" onclick="openDetail('color','${g.group}','${t.name}')">
          <div class="grid-swatch"><div class="grid-swatch-fill" style="background:${rgba}"></div><div class="grid-swatch-hex" style="${swatchTextStyle(t.h)}">${escHtml(display)}</div></div>
          <div class="grid-card-body"><div class="grid-card-name">${escHtml(t.name)}</div><div class="grid-card-ref">${escHtml(g.group)}</div></div>
        </div>`;
      });
      html += `</div></div>`;
    });
  }

  else if (curColl === 'radius') {
    const filtered = DATA.radius.filter(t => matchQ(t.name));
    if (filtered.length) {
      html += `<div class="grid-section"><div class="grid-section-hd">Radius <span style="font-weight:400;opacity:.5">${filtered.length}</span></div><div class="grid-cards">`;
      filtered.forEach(t => {
        const isCircle = t.value === 999;
        const w = isCircle ? 60 : 80;
        const h = isCircle ? 60 : 68;
        const r = t.value;
        html += `<div class="grid-card" data-rid="radius|全部|${t.name}" onclick="openDetail('radius','全部','${t.name}')">
          <div class="grid-preview"><div class="radius-shape" style="width:${w}px;height:${h}px;border-radius:${r}px"></div></div>
          <div class="grid-card-body"><div class="grid-card-name">${escHtml(t.name)}</div><div class="grid-card-ref">${t.value === 999 ? '999 (circle)' : t.value + ' dp'}</div></div>
        </div>`;
      });
      html += `</div></div>`;
    }
  }

  else if (curColl === 'number') {
    const groups = DATA.number;
    const maxVal = Math.max(...DATA.number.flatMap(g=>g.tokens.map(t=>t.value)));
    groups.forEach(g => {
      const filtered = g.tokens.filter(t => matchQ(t.name) || matchQ(g.group));
      if (!filtered.length) return;
      html += `<div class="grid-section"><div class="grid-section-hd">${g.group} <span style="font-weight:400;opacity:.5">${filtered.length}</span></div><div class="grid-cards">`;
      filtered.forEach(t => {
        let previewHtml;
        if (g.group === 'padding') {
          const vp = Math.max(4, Math.round((t.value / maxVal) * 20));
          const ow = 68, oh = 52;
          const iw = Math.max(16, ow - vp * 2), ih = Math.max(12, oh - vp * 2);
          previewHtml = `<div class="pd-demo"><div class="pd-outer" style="width:${ow}px;height:${oh}px"><div class="pd-inner" style="width:${iw}px;height:${ih}px"></div></div></div>`;
        } else {
          const gapW = t.value === 0 ? 4 : Math.max(6, Math.round((t.value / maxVal) * 80));
          previewHtml = `<div class="sp-demo"><div class="sp-block"></div><div class="sp-gap" style="width:${gapW}px"></div><div class="sp-block"></div></div>`;
        }
        html += `<div class="grid-card" data-rid="number|${g.group}|${t.name}" onclick="openDetail('number','${g.group}','${t.name}')">
          <div class="grid-preview">${previewHtml}</div>
          <div class="grid-card-body"><div class="grid-card-name">${escHtml(t.name)}</div><div class="grid-card-ref">${t.value} dp</div></div>
        </div>`;
      });
      html += `</div></div>`;
    });
  }

  else if (curColl === 'weight') {
    const filtered = DATA.weight.filter(t => matchQ(t.name));
    if (filtered.length) {
      html += `<div class="grid-section"><div class="grid-section-hd">Font Weight <span style="font-weight:400;opacity:.5">${filtered.length}</span></div><div class="grid-cards">`;
      filtered.forEach(t => {
        html += `<div class="grid-card" data-rid="weight|全部|${t.name}" onclick="openDetail('weight','全部','${t.name}')">
          <div class="grid-preview"><span class="weight-sample" style="font-weight:${t.value}">Aa</span></div>
          <div class="grid-card-body"><div class="grid-card-name">${escHtml(t.name)}</div><div class="grid-card-ref">${t.value}</div></div>
        </div>`;
      });
      html += `</div></div>`;
    }
  }

  else if (curColl === 'types') {
    const groups = DATA.types;
    groups.forEach(g => {
      const filtered = g.tokens.filter(t => matchQ(t.name) || matchQ(g.group));
      if (!filtered.length) return;
      html += `<div class="grid-section"><div class="grid-section-hd">${g.group} <span style="font-weight:400;opacity:.5">${filtered.length}</span></div><div class="grid-cards">`;
      filtered.forEach(t => {
        const isSize = g.group === 'Size';
        const preview = isSize
          ? `<span class="types-sample" style="font-size:${Math.min(t.value, 32)}px">Aa</span>`
          : `<span class="types-sample" style="font-size:22px;font-weight:${t.value === 'Medium' ? 500 : t.value === 'Semibold' ? 600 : t.value === 'Demibold' ? 550 : t.value === 'Regular' ? 400 : 400}">${escHtml(t.value)}</span>`;
        html += `<div class="grid-card" data-rid="types|${g.group}|${t.name}" onclick="openDetail('types','${g.group}','${t.name}')">
          <div class="grid-preview">${preview}</div>
          <div class="grid-card-body"><div class="grid-card-name">${escHtml(t.name)}</div><div class="grid-card-ref">${isSize ? t.value + ' sp' : escHtml(String(t.value))}</div></div>
        </div>`;
      });
      html += `</div></div>`;
    });
  }

  else if (curColl === 'iib') {
    const groups = DATA.iib;
    groups.forEach(g => {
      const filtered = g.tokens.filter(t => matchQ(t.name) || matchQ(g.group));
      if (!filtered.length) return;
      html += `<div class="grid-section"><div class="grid-section-hd">${g.group} <span style="font-weight:400;opacity:.5">${filtered.length}</span></div><div class="grid-cards">`;
      filtered.forEach(t => {
        const mdata = t[curMode];
        const rgba = toRgba(mdata.h);
        const display = toDisplay(mdata.h);
        html += `<div class="grid-card" data-rid="iib|${g.group}|${t.name}" onclick="openDetail('iib','${g.group}','${t.name}')">
          <div class="grid-swatch"><div class="grid-swatch-fill" style="background:${rgba}"></div><div class="grid-swatch-hex" style="${swatchTextStyle(mdata.h)}">${escHtml(display)}</div></div>
          <div class="grid-card-body"><div class="grid-card-name">${escHtml(t.name)}</div><div class="grid-card-ref">${escHtml(g.group)}</div></div>
        </div>`;
      });
      html += `</div></div>`;
    });
  }

  wrap.innerHTML = html || `<div style="padding:40px;color:#a3a3a3;font-size:13px">无匹配结果</div>`;
  // restore selected state after re-render
  if (dpToken) {
    const card = wrap.querySelector(`.grid-card[data-rid="${dpToken.rid}"]`);
    if (card) card.classList.add('selected');
  }
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function switchCollection(id) {
  curColl = id;
  curGroup = null;
  expandedGroups.clear();
  const mt = document.getElementById('mode-toggle');
  mt.style.display = (id === 'feature' || id === 'iib') ? 'flex' : 'none';
  // auto switch to list for non-grid collections
  if (!GRID_COLLS.has(id) && curView === 'grid') {
    curView = 'list';
    document.getElementById('vb-list').classList.add('active');
    document.getElementById('vb-grid').classList.remove('active');
  }
  document.getElementById('vb-grid').style.display = GRID_COLLS.has(id) ? '' : 'none';
  document.getElementById('hd-title').textContent = COLL_NAMES[id];
  renderSidebar();
  renderView();
}

function toggleGroup(name) {
  if (expandedGroups.has(name)) {
    expandedGroups.delete(name);
  } else {
    expandedGroups.add(name);
    scrollToSection(name);
  }
  renderSidebar();
}

function scrollToSection(groupName) {
  // works for both table and grid views
  const wrap = document.getElementById('table-wrap');
  const row = wrap.querySelector(`tr[data-grp="${groupName}"]`);
  if (row) {
    const wrapTop = wrap.getBoundingClientRect().top;
    const rowTop  = row.getBoundingClientRect().top;
    wrap.scrollTo({ top: wrap.scrollTop + rowTop - wrapTop - 8, behavior: 'smooth' });
  }
}

function setMode(m) {
  curMode = m;
  document.getElementById('btn-light').className = 'mode-btn' + (m==='L'?' active':'');
  document.getElementById('btn-dark').className  = 'mode-btn' + (m==='D'?' active':'');
  renderView();
  if (dpToken) document.getElementById('dp-body').innerHTML = buildDpBody();
}

function onSearch(v) {
  searchQ = v;
  renderView();
}

function copyToken(name) {
  navigator.clipboard.writeText(name).catch(()=>{});
  const t = document.getElementById('toast');
  t.textContent = `已复制: ${name}`;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

function toggleTheme() {
  const isDark = document.body.classList.toggle('dark');
  document.getElementById('theme-icon-moon').style.display = isDark ? 'none' : '';
  document.getElementById('theme-icon-sun').style.display  = isDark ? '' : 'none';
}

function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  document.getElementById('sidebar').classList.toggle('collapsed', sidebarCollapsed);
  document.getElementById('sb-expand-btn').style.display = sidebarCollapsed ? '' : 'none';
}

// ─── DETAIL PANEL ─────────────────────────────────────────────────────────────
function openDetail(coll, group, name) {
  dpToken = { coll, group, name, rid:`${coll}|${group}|${name}` };

  // auto-expand sidebar group
  if (group && !expandedGroups.has(group)) expandedGroups.add(group);

  // re-render sidebar to reflect expansion + active token
  renderSidebar();

  // highlight row in table
  document.querySelectorAll('tr.selected').forEach(r => r.classList.remove('selected'));
  const row = document.querySelector(`tr[data-rid="${dpToken.rid}"]`);
  if (row) {
    row.classList.add('selected');
    // scroll table to row if it's not visible
    const wrap = document.getElementById('table-wrap');
    if (wrap && curView === 'list') {
      const wt = wrap.getBoundingClientRect().top;
      const rt = row.getBoundingClientRect().top;
      const offset = rt - wt;
      if (offset < 44 || offset > wrap.clientHeight - 44) {
        wrap.scrollTo({ top: wrap.scrollTop + offset - wrap.clientHeight / 2, behavior: 'smooth' });
      }
    }
  }

  // highlight grid card
  document.querySelectorAll('.grid-card.selected').forEach(c => c.classList.remove('selected'));
  if (curView === 'grid') {
    const card = document.querySelector(`.grid-card[data-rid="${dpToken.rid}"]`);
    if (card) {
      card.classList.add('selected');
      card.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  }

  // populate header
  document.getElementById('dp-title').textContent = name;
  document.getElementById('dp-path').textContent = group ? `${coll}/${group}` : coll;
  const descEl = document.getElementById('dp-desc');
  const desc = DESC_MAP[name];
  descEl.textContent = desc || '';
  descEl.style.display = desc ? '' : 'none';

  // build body
  document.getElementById('dp-body').innerHTML = buildDpBody();
  document.getElementById('detail-panel').classList.add('open');
  document.querySelector('.main').style.marginRight = '300px';
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  document.querySelector('.main').style.marginRight = '';
  document.querySelectorAll('tr.selected').forEach(r => r.classList.remove('selected'));
  dpToken = null;
  renderSidebar();
}

function setSyntax(s) {
  curSyntax = s;
  document.querySelectorAll('.dp-tab').forEach(b => b.classList.toggle('active', b.dataset.syn === s));
  // refresh code block in panel
  const codeEl = document.getElementById('dp-code-text');
  if (codeEl && dpToken) codeEl.innerHTML = buildCodeSnippet();
  // refresh table syntax column
  renderTable();
}

function buildCodeSnippet() {
  if (!dpToken) return '';
  const { coll, group, name } = dpToken;
  if (coll === 'feature') {
    const t = DATA.feature.flatMap(g=>g.tokens).find(x=>x.name===name);
    if (!t) return '';
    const h = t[curMode].h, ref = t[curMode].r;
    if (curSyntax === 'css') {
      return escHtml(`--${group}-${name}: ${toCSShex(h)};`);
    }
    const aName = 'miuix_default_color_' + name + (curMode==='L'?'_light':'_dark');
    const refStr = ref ? `@color/${toAndroidRef(ref)}` : '#'+h;
    return escHtml(`<color name="${aName}">${refStr}</color>`);
  }
  if (coll === 'color') {
    const g = DATA.color.find(x=>x.group===group);
    const t = g ? g.tokens.find(x=>x.name===name) : null;
    if (!t) return '';
    if (curSyntax === 'css') return escHtml(`--${name}: ${toCSShex(t.h)};`);
    const aName = 'miuix_color_' + t.name.replace(/-/g,'_');
    return escHtml(`<color name="${aName}">#${t.h.length===8?t.h.slice(2):t.h}</color>`);
  }
  if (coll === 'radius') {
    const t = DATA.radius.find(x=>x.name===name);
    if (!t) return '';
    if (curSyntax === 'css') return escHtml(`--radius-${name}: ${t.value===999?'999':''+t.value}px;`);
    return escHtml(`<dimen name="miuix_radius_${name}">${t.value}dp</dimen>`);
  }
  if (coll === 'number') {
    const g2 = DATA.number.find(x=>x.group===group);
    const t = g2 ? g2.tokens.find(x=>x.name===name) : null;
    if (!t) return '';
    if (curSyntax === 'css') return escHtml(`--${group}-${name}: ${t.value}px;`);
    return escHtml(`<dimen name="miuix_number_${name}">${t.value} dp</dimen>`);
  }
  if (coll === 'weight') {
    const t = DATA.weight.find(x=>x.name===name);
    if (!t) return '';
    if (curSyntax === 'css') return escHtml(`--weight-${name.toLowerCase()}: ${t.value};`);
    return escHtml(`<integer name="miuix_weight_${name.toLowerCase()}">${t.value}</integer>`);
  }
  if (coll === 'types') {
    const g3 = DATA.types.find(x=>x.group===group);
    const t = g3 ? g3.tokens.find(x=>x.name===name) : null;
    if (!t) return '';
    const nKey = name.toLowerCase().replace(/\s+/g,'_');
    const isSize = group === 'Size';
    if (curSyntax === 'css') return isSize ? escHtml(`--types-size-${nKey}: ${t.value}sp;`) : escHtml(`--types-weight-${nKey}: ${String(t.value)};`);
    const aName = isSize ? `miuix_types_size_${nKey}` : `miuix_types_weight_${nKey}`;
    return isSize ? escHtml(`<dimen name="${aName}">${t.value}sp</dimen>`) : escHtml(`<string name="${aName}">${t.value}</string>`);
  }
  if (coll === 'iib') {
    const gi = DATA.iib.find(x=>x.group===group);
    const t = gi ? gi.tokens.find(x=>x.name===name) : null;
    if (!t) return '';
    const h = t[curMode].h;
    const aName = `iib_${name}${curMode==='L'?'_light':'_dark'}`;
    if (curSyntax === 'css') return escHtml(`--${name}-${curMode==='L'?'light':'dark'}: ${toCSShex(h)};`);
    return escHtml(`<color name="${aName}">#${h}</color>`);
  }
  return '';
}

function buildDpBody() {
  if (!dpToken) return '';
  const { coll, group, name } = dpToken;
  let html = '';

  // ── Color token detail (feature/color/iib) ──
  if (coll === 'feature' || coll === 'color' || coll === 'iib') {
    let h, ref = null;
    if (coll === 'feature') {
      const t = DATA.feature.flatMap(g=>g.tokens).find(x=>x.name===name);
      if (!t) return '';
      h = t[curMode].h; ref = t[curMode].r;
    } else if (coll === 'iib') {
      const gi = DATA.iib.find(x=>x.group===group);
      const t = gi ? gi.tokens.find(x=>x.name===name) : null;
      if (!t) return '';
      h = t[curMode].h; ref = t[curMode].r;
    } else {
      const g = DATA.color.find(x=>x.group===group);
      const t = g ? g.tokens.find(x=>x.name===name) : null;
      if (!t) return '';
      h = t.h;
    }
    const rgba = toRgba(h);
    const c = parseHex(h);
    const toHSL = (r,g,b) => {
      r/=255;g/=255;b/=255;
      const max=Math.max(r,g,b),min=Math.min(r,g,b);
      let h2=0,s=0,l=(max+min)/2;
      if(max!==min){const d=max-min;s=l>.5?d/(2-max-min):d/(max+min);switch(max){case r:h2=(g-b)/d+(g<b?6:0);break;case g:h2=(b-r)/d+2;break;case b:h2=(r-g)/d+4;}h2/=6;}
      return `hsl(${Math.round(h2*360)}, ${Math.round(s*100)}%, ${Math.round(l*100)}%)`;
    };
    const composedR = c.r*c.a+255*(1-c.a), composedG = c.g*c.a+255*(1-c.a), composedB = c.b*c.a+255*(1-c.a);
    const hexDisp = '#'+[c.r,c.g,c.b].map(v=>('0'+v.toString(16)).slice(-2).toUpperCase()).join('');
    const alphaDisp = c.a < 0.999 ? ` · ${Math.round(c.a*100)}%` : '';
    const rgbDisp = c.a < 0.999 ? `rgba(${c.r},${c.g},${c.b},${c.a.toFixed(2)})` : `rgb(${c.r},${c.g},${c.b})`;

    // current value
    html += `<div class="dp-section">
      <div class="dp-section-label">当前值</div>
      <div class="dp-color-block">
        <div class="dp-swatch-lg"><div class="dp-swatch-lg-fill" style="background:${rgba}"></div></div>
        <div class="dp-color-vals">
          <div class="dp-color-row"><span class="dp-color-label">HEX</span><span class="dp-color-val">${hexDisp}${alphaDisp}</span></div>
          <div class="dp-color-row"><span class="dp-color-label">RGB</span><span class="dp-color-val">${rgbDisp}</span></div>
          <div class="dp-color-row"><span class="dp-color-label">HSL</span><span class="dp-color-val">${toHSL(composedR,composedG,composedB)}</span></div>
        </div>
      </div>
    </div>`;

    // contrast
    const crWhite = contrastWith(h, 255,255,255);
    const crBlack = contrastWith(h, 0,0,0);
    html += `<div class="dp-section">
      <div class="dp-section-label">对比度</div>
      <div class="dp-contrast-row">
        <div class="dp-contrast-swatch" style="background:#fff;box-shadow:0 0 0 1px #e5e5e5"><span style="color:${rgba}">A</span></div>
        <span class="dp-contrast-label">白色背景</span>
        <span class="dp-contrast-ratio">${crWhite.toFixed(1)}:1</span>
        ${wcagBadge(crWhite)}
      </div>
      <div class="dp-contrast-row">
        <div class="dp-contrast-swatch" style="background:#000"><span style="color:${rgba}">A</span></div>
        <span class="dp-contrast-label">黑色背景</span>
        <span class="dp-contrast-ratio">${crBlack.toFixed(1)}:1</span>
        ${wcagBadge(crBlack)}
      </div>
    </div>`;

    // mode comparison (feature + iib)
    if (coll === 'iib') {
      const gi = DATA.iib.find(x=>x.group===group);
      const t = gi ? gi.tokens.find(x=>x.name===name) : null;
      if (t) {
        const lv = toDisplay(t.L.h), dv = toDisplay(t.D.h);
        html += `<div class="dp-section">
          <div class="dp-section-label">模式对比</div>
          <div class="dp-mode-row${curMode==='L'?' active':''}">
            <span class="dp-mode-label">Light</span>
            <div class="dp-mode-swatch"><div class="dp-mode-fill" style="background:${toRgba(t.L.h)}"></div></div>
            <span class="dp-mode-val">${escHtml(lv)}</span>
          </div>
          <div class="dp-mode-row${curMode==='D'?' active':''}">
            <span class="dp-mode-label">Dark</span>
            <div class="dp-mode-swatch"><div class="dp-mode-fill" style="background:${toRgba(t.D.h)}"></div></div>
            <span class="dp-mode-val">${escHtml(dv)}</span>
          </div>
        </div>`;
        // reference chain
        if (ref) {
          const refName = ref.split('/').pop();
          const refGroup = ref.split('/')[0];
          const refGroup2 = DATA.color.find(g=>g.group===refGroup);
          const refToken = refGroup2 ? refGroup2.tokens.find(x=>x.name===refName) : null;
          html += `<div class="dp-section">
            <div class="dp-section-label">引用链路</div>
            <div class="dp-chain-item">
              <div class="dp-chain-swatch"><div class="dp-chain-fill" style="background:${toRgba(h)}"></div></div>
              <span class="dp-chain-name">${escHtml(name)}</span>
            </div>
            <div class="dp-chain-arrow">↓</div>
            <div class="dp-chain-item">
              <div class="dp-chain-swatch">${refToken?`<div class="dp-chain-fill" style="background:${toRgba(refToken.h)}"></div>`:''}</div>
              <span class="dp-chain-name">${escHtml(refName)}</span>
            </div>
            ${refToken?`<div class="dp-chain-arrow">↓</div>
            <div class="dp-chain-item">
              <div class="dp-chain-swatch"><div class="dp-chain-fill" style="background:${toRgba(refToken.h)}"></div></div>
              <span class="dp-chain-name">${escHtml(toDisplay(refToken.h))}</span>
            </div>`:''}
          </div>`;
        }
      }
    }
    if (coll === 'feature') {
      const t = DATA.feature.flatMap(g=>g.tokens).find(x=>x.name===name);
      const lv = toDisplay(t.L.h), dv = toDisplay(t.D.h);
      html += `<div class="dp-section">
        <div class="dp-section-label">模式对比</div>
        <div class="dp-mode-row${curMode==='L'?' active':''}">
          <span class="dp-mode-label">Light</span>
          <div class="dp-mode-swatch"><div class="dp-mode-fill" style="background:${toRgba(t.L.h)}"></div></div>
          <span class="dp-mode-val">${escHtml(lv)}</span>
        </div>
        <div class="dp-mode-row${curMode==='D'?' active':''}">
          <span class="dp-mode-label">Dark</span>
          <div class="dp-mode-swatch"><div class="dp-mode-fill" style="background:${toRgba(t.D.h)}"></div></div>
          <span class="dp-mode-val">${escHtml(dv)}</span>
        </div>
      </div>`;

      // reference chain
      if (t[curMode].r) {
        const refName = t[curMode].r.split('/').pop();
        const refGroup = t[curMode].r.split('/')[0];
        const refGroup2 = DATA.color.find(g=>g.group===refGroup);
        const refToken = refGroup2 ? refGroup2.tokens.find(x=>x.name===refName) : null;
        html += `<div class="dp-section">
          <div class="dp-section-label">引用链路</div>
          <div class="dp-chain-item">
            <div class="dp-chain-swatch"><div class="dp-chain-fill" style="background:${toRgba(h)}"></div></div>
            <span class="dp-chain-name">${escHtml(name)}</span>
          </div>
          <div class="dp-chain-arrow">↓</div>
          <div class="dp-chain-item">
            <div class="dp-chain-swatch">${refToken?`<div class="dp-chain-fill" style="background:${toRgba(refToken.h)}"></div>`:''}</div>
            <span class="dp-chain-name">${escHtml(refName)}</span>
          </div>
          ${refToken?`<div class="dp-chain-arrow">↓</div>
          <div class="dp-chain-item">
            <div class="dp-chain-swatch"><div class="dp-chain-fill" style="background:${toRgba(refToken.h)}"></div></div>
            <span class="dp-chain-name">${escHtml(toDisplay(refToken.h))}</span>
          </div>`:''}
        </div>`;
      }
    }
  }

  // ── Non-color token detail ──
  else {
    let valHtml = '';
    if (coll === 'radius') {
      const t = DATA.radius.find(x=>x.name===name);
      if (t) valHtml = `<div style="padding:16px 0;display:flex;align-items:center;justify-content:center"><div style="width:64px;height:64px;border-radius:${Math.min(t.value,32)}px;background:#3482ff1a;border:2px solid #3482ff55"></div></div><div class="dp-color-row"><span class="dp-color-label">值</span><span class="dp-color-val">${t.value === 999 ? '999 (circle)' : t.value + ' dp'}</span></div>`;
    } else if (coll === 'number') {
      const g2 = DATA.number.find(x=>x.group===group);
      const t = g2 ? g2.tokens.find(x=>x.name===name) : null;
      if (t) valHtml = `<div class="dp-color-row"><span class="dp-color-label">值</span><span class="dp-color-val">${t.value} dp</span></div><div class="dp-color-row"><span class="dp-color-label">组</span><span class="dp-color-val">${group}</span></div>`;
    } else if (coll === 'weight') {
      const t = DATA.weight.find(x=>x.name===name);
      if (t) valHtml = `<div style="padding:12px 0 16px"><span style="font-size:32px;font-weight:${t.value};font-family:'MiSans VF','MiSans','Inter',sans-serif;color:inherit">Aa</span></div><div class="dp-color-row"><span class="dp-color-label">值</span><span class="dp-color-val">${t.value}</span></div>`;
    } else if (coll === 'types') {
      const g3 = DATA.types.find(x=>x.group===group);
      const t = g3 ? g3.tokens.find(x=>x.name===name) : null;
      if (t) {
        const isSize = group === 'Size';
        valHtml = `<div style="padding:12px 0 16px"><span style="font-size:${isSize?Math.min(t.value,32)+'px':'22px'};font-family:'MiSans VF','MiSans','Inter',sans-serif;color:inherit">${isSize?'Aa':escHtml(String(t.value))}</span></div><div class="dp-color-row"><span class="dp-color-label">值</span><span class="dp-color-val">${escHtml(String(t.value))}${isSize?' sp':''}</span></div>`;
      }
    }
    if (valHtml) html += `<div class="dp-section"><div class="dp-section-label">当前值</div>${valHtml}</div>`;
  }

  // ── Code section (all tokens) ──
  html += `<div class="dp-section">
    <div class="dp-section-label">代码</div>
    <div class="dp-code-hd">
      <div class="dp-code-tabs">
        <button class="dp-tab${curSyntax==='android'?' active':''}" data-syn="android" onclick="setSyntax('android')">Android</button>
        <button class="dp-tab${curSyntax==='css'?' active':''}" data-syn="css" onclick="setSyntax('css')">CSS</button>
      </div>
      <button class="dp-copy-btn" id="dp-copy-btn" onclick="copyCode()" title="复制">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </button>
    </div>
    <div class="dp-code-block">
      <div class="dp-code-text" id="dp-code-text">${buildCodeSnippet()}</div>
    </div>
  </div>`;

  return html;
}

function copyCode() {
  const el = document.getElementById('dp-code-text');
  if (el) navigator.clipboard.writeText(el.textContent.trim()).catch(()=>{});
  const btn = document.getElementById('dp-copy-btn');
  if (btn) {
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
    }, 2000);
  }
  const t = document.getElementById('toast');
  t.textContent = '已复制代码';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

let expFmt = 'android';

  expFmt = 'android';
  document.querySelectorAll('.exp-tab').forEach(b => b.classList.toggle('active', b.dataset.fmt === expFmt));
  document.getElementById('exp-count').textContent = `${getExpTokenCount()} 个令牌`;
  document.getElementById('exp-code').innerHTML = buildExportHtml();
  document.getElementById('exp-overlay').classList.add('open');
}

function closeExportModal() {
  document.getElementById('exp-overlay').classList.remove('open');
}

function setExportFmt(fmt) {
  expFmt = fmt;
  document.querySelectorAll('.exp-tab').forEach(b => b.classList.toggle('active', b.dataset.fmt === fmt));
  document.getElementById('exp-code').innerHTML = buildExportHtml();

function getExpTokenCount() {
  if (curColl === 'feature') return DATA.feature.reduce((s,g)=>s+g.tokens.length,0);
  if (curColl === 'color')   return DATA.color.reduce((s,g)=>s+g.tokens.length,0);
  if (curColl === 'radius')  return DATA.radius.length;
  if (curColl === 'number')  return DATA.number.reduce((s,g)=>s+g.tokens.length,0);
  if (curColl === 'weight')  return DATA.weight.length;
  if (curColl === 'types')   return DATA.types.reduce((s,g)=>s+g.tokens.length,0);
  if (curColl === 'iib')     return DATA.iib.reduce((s,g)=>s+g.tokens.length,0);
  return 0;
}

function getExportRaw() {
  if (expFmt === 'json') {
    let obj;
    if (curColl === 'feature') {
      obj = { collection:'feature', groups: DATA.feature.map(g=>({ group:g.group, tokens:g.tokens.map(t=>({ name:t.name, light:toCSShex(t.L.h), dark:toCSShex(t.D.h), ref_light:t.L.r||null, ref_dark:t.D.r||null })) })) };
    } else if (curColl === 'color') {
      obj = { collection:'color', groups: DATA.color.map(g=>({ group:g.group, tokens:g.tokens.map(t=>({ name:t.name, value:toCSShex(t.h) })) })) };
    } else if (curColl === 'radius') {
      obj = { collection:'radius', tokens: DATA.radius.map(t=>({ name:t.name, value:t.value })) };
    } else if (curColl === 'number') {
      obj = { collection:'number', groups: DATA.number.map(g=>({ group:g.group, tokens:g.tokens.map(t=>({ name:t.name, value:t.value })) })) };
    } else if (curColl === 'weight') {
      obj = { collection:'weight', tokens: DATA.weight.map(t=>({ name:t.name, value:t.value })) };
    } else if (curColl === 'types') {
      obj = { collection:'types', groups: DATA.types.map(g=>({ group:g.group, tokens:g.tokens.map(t=>({ name:t.name, value:t.value })) })) };
    } else if (curColl === 'iib') {
      obj = { collection:'iib', groups: DATA.iib.map(g=>({ group:g.group, tokens:g.tokens.map(t=>({ name:t.name, light:toCSShex(t.L.h), dark:toCSShex(t.D.h) })) })) };
    }
    return JSON.stringify(obj, null, 2);
  }

  if (expFmt === 'android') {
    const lines = ['<?xml version="1.0" encoding="utf-8"?>', '<resources>'];
    if (curColl === 'feature') {
      ['L','D'].forEach(m => {
        DATA.feature.forEach(g => g.tokens.forEach(t => {
          const n = `miuix_default_color_${t.name}${m==='L'?'_light':'_dark'}`;
          const v = t[m].r ? '@color/'+toAndroidRef(t[m].r) : '#'+t[m].h;
          lines.push(`    <color name="${n}">${v}</color>`);
        }));
      });
    } else if (curColl === 'color') {
      DATA.color.forEach(g => g.tokens.forEach(t => {
        const n = 'miuix_color_'+t.name.replace(/-/g,'_');
        const h = t.h.length===8 ? t.h.slice(2) : t.h;
        lines.push(`    <color name="${n}">#${h}</color>`);
      }));
    } else if (curColl === 'radius') {
      DATA.radius.forEach(t => lines.push(`    <dimen name="miuix_radius_${t.name}">${t.value}dp</dimen>`));
    } else if (curColl === 'number') {
      DATA.number.forEach(g => g.tokens.forEach(t => lines.push(`    <dimen name="miuix_number_${t.name}">${t.value}dp</dimen>`)));
    } else if (curColl === 'weight') {
      DATA.weight.forEach(t => lines.push(`    <integer name="miuix_weight_${t.name.toLowerCase()}">${t.value}</integer>`));
    } else if (curColl === 'types') {
      DATA.types.forEach(g => {
        const isSize = g.group === 'Size';
        g.tokens.forEach(t => {
          const nk = t.name.toLowerCase().replace(/\s+/g,'_');
          lines.push(isSize ? `    <dimen name="miuix_types_size_${nk}">${t.value}sp</dimen>` : `    <string name="miuix_types_weight_${nk}">${t.value}</string>`);
        });
      });
    } else if (curColl === 'iib') {
      ['L','D'].forEach(m => {
        DATA.iib.forEach(g => g.tokens.forEach(t => {
          const n = `iib_${t.name}${m==='L'?'_light':'_dark'}`;
          lines.push(`    <color name="${n}">#${t[m].h}</color>`);
        }));
      });
    }
    lines.push('</resources>');
    return lines.join('\n');
  }

  if (expFmt === 'css') {
    const lines = [':root {'];
    if (curColl === 'feature') {
      DATA.feature.forEach(g => g.tokens.forEach(t => lines.push(`  --${t.name}: ${toCSShex(t[curMode].h)};`)));
    } else if (curColl === 'color') {
      DATA.color.forEach(g => g.tokens.forEach(t => lines.push(`  --${t.name}: ${toCSShex(t.h)};`)));
    } else if (curColl === 'radius') {
      DATA.radius.forEach(t => lines.push(`  --radius-${t.name}: ${t.value===999?'999':''+t.value}px;`));
    } else if (curColl === 'number') {
      DATA.number.forEach(g => g.tokens.forEach(t => lines.push(`  --${g.group}-${t.name}: ${t.value}px;`)));
    } else if (curColl === 'weight') {
      DATA.weight.forEach(t => lines.push(`  --weight-${t.name.toLowerCase()}: ${t.value};`));
    } else if (curColl === 'types') {
      DATA.types.forEach(g => {
        const isSize = g.group === 'Size';
        g.tokens.forEach(t => {
          const nk = t.name.toLowerCase().replace(/\s+/g,'_');
          lines.push(isSize ? `  --types-size-${nk}: ${t.value}sp;` : `  --types-weight-${nk}: ${String(t.value)};`);
        });
      });
    } else if (curColl === 'iib') {
      DATA.iib.forEach(g => g.tokens.forEach(t => {
        lines.push(`  --${t.name}-light: ${toCSShex(t.L.h)};`);
        lines.push(`  --${t.name}-dark: ${toCSShex(t.D.h)};`);
      }));
    }
    lines.push('}');
    return lines.join('\n');
  }
  return '';
}

function buildExportHtml() {
  const raw = getExportRaw();
  if (expFmt === 'json')    return hlJson(raw);
  if (expFmt === 'android') return hlXml(raw);
  if (expFmt === 'css')     return hlCss(raw);
  return escHtml(raw);
}

function hlXml(raw) {
  return raw.split('\n').map(line => {
    let s = escHtml(line);
    // XML declaration gray
    s = s.replace(/^(&lt;\?xml .+?\?&gt;)/, '<span style="color:#9ca3af">$1</span>');
    // tag name green
    s = s.replace(/(&lt;\/?)([\w]+)/, '$1<span class="syn-key">$2</span>');
    // attribute name blue
    s = s.replace(/ ([\w:]+)=&quot;/g, ' <span class="syn-attr">$1</span>=&quot;');
    // attribute value orange
    s = s.replace(/=&quot;([^"]*?)&quot;/g, '=&quot;<span class="syn-val">$1</span>&quot;');
    // text content between > and </
    s = s.replace(/&gt;([^<&]+)&lt;\//g, '&gt;<span class="syn-tag">$1</span>&lt;/');
    return s;
  }).join('\n');
}

function hlCss(raw) {
  return raw.split('\n').map(line => {
    let s = escHtml(line);
    // --property: value;
    s = s.replace(/(--[\w-]+)(\s*:\s*)(.+?)(;)\s*$/, '<span class="syn-attr">$1</span><span class="syn-tag">$2</span><span class="syn-val">$3</span><span class="syn-tag">$4</span>');
    return s;
  }).join('\n');
}

function hlJson(raw) {
  return raw.split('\n').map(line => {
    let s = escHtml(line);
    // string values after colon
    s = s.replace(/(:\s*)(&quot;.*?&quot;)(,?)$/, '$1<span class="syn-val">$2</span>$3');
    // null values
    s = s.replace(/(:\s*)(null)(,?)$/, '$1<span style="color:#a78bfa">$2</span>$3');
    // number values
    s = s.replace(/(:\s*)(\d+(?:\.\d+)?)(,?)$/, '$1<span class="syn-key">$2</span>$3');
    // keys (before the processed value)
    s = s.replace(/^(\s*)(&quot;[^"]+&quot;)(\s*:)/, '$1<span class="syn-attr">$2</span>$3');
    return s;
  }).join('\n');
}

function downloadExport() {
  const raw = getExportRaw();
  const ext  = expFmt === 'android' ? 'xml' : expFmt === 'css' ? 'css' : 'json';
  const mime = expFmt === 'json' ? 'application/json' : 'text/plain';
  const a = document.createElement('a');
  a.href = 'data:'+mime+';charset=utf-8,'+encodeURIComponent(raw);
  a.download = `${(COLL_NAMES[curColl]||curColl).replace(/\s/g,'_')}_tokens.${ext}`;
  a.click();
}

function downloadAllJson() {
  const all = {
    version: '1.0',
    exported: new Date().toISOString().slice(0,10),
    collections: {
      feature: DATA.feature.map(g => ({
        group: g.group,
        tokens: g.tokens.map(t => ({ name:t.name, light:toCSShex(t.L.h), dark:toCSShex(t.D.h), ref_light:t.L.r||null, ref_dark:t.D.r||null }))
      })),
      color: DATA.color.map(g => ({
        group: g.group,
        tokens: g.tokens.map(t => ({ name:t.name, value:toCSShex(t.h) }))
      })),
      radius: DATA.radius.map(t => ({ name:t.name, value:t.value })),
      number: DATA.number.map(g => ({
        group: g.group,
        tokens: g.tokens.map(t => ({ name:t.name, value:t.value }))
      })),
      weight: DATA.weight.map(t => ({ name:t.name, value:t.value })),
      types: DATA.types.map(g => ({
        group: g.group,
        tokens: g.tokens.map(t => ({ name:t.name, value:t.value }))
      })),
      iib: DATA.iib.map(g => ({
        group: g.group,
        tokens: g.tokens.map(t => ({ name:t.name, light:toCSShex(t.L.h), dark:toCSShex(t.D.h), ref_light:t.L.r||null, ref_dark:t.D.r||null }))
      })),
    }
  };
  const raw = JSON.stringify(all, null, 2);
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(raw);
  a.download = 'IIB_Design_Tokens_All.json';
  a.click();
}

function toggleShortcutPanel() {
  const panel = document.getElementById('shortcut-panel');
  panel.classList.toggle('open');
  document.getElementById('sb-footer').style.color = panel.classList.contains('open') ? 'var(--accent, #3482ff)' : '';
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const active = document.activeElement;
  const isInput = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA');

  if (e.key === 'Escape') {
    if (document.getElementById('exp-overlay').classList.contains('open')) closeExportModal();
    else if (document.getElementById('detail-panel').classList.contains('open')) closeDetail();
    else if (document.getElementById('shortcut-panel').classList.contains('open')) toggleShortcutPanel();
    else if (isInput) { active.blur(); }
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    const inp = document.getElementById('search-input');
    if (inp) { inp.focus(); inp.select(); }
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'g') {
    e.preventDefault();
    setView(curView === 'list' ? 'grid' : 'list');
  }
});
renderSidebar();
renderView();
</script>
